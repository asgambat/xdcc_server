version: '3'

vars:
  # Go configuration
  GO_CMD: go
  GO_BUILD_FLAGS: -ldflags="-s -w" -p 2
  GO_TEST_FLAGS: -race -cover -p 2

  # Binary output
  BIN_DIR: bin
  BINARIES: xdcc-server xdcc-dl xdcc-search xdcc-browse

  # Frontend configuration
  WEB_DIR: web
  WEB_DIST_DIR: web/dist

  # Docker configuration
  DOCKER_IMAGE: xdcc_server
  DOCKER_TAG: latest

  # Platforms for cross-compilation
  PLATFORMS: linux/amd64 linux/arm64 darwin/amd64 darwin/arm64

tasks:
  # ============================================================
  # Main tasks
  # ============================================================

  default:
    desc: Show available tasks
    cmds:
      - task --list-all
    silent: true

  all:
    desc: Build everything (frontend + all backend binaries)
    deps: [frontend:build]
    cmds:
      - task: build:all

  # ============================================================
  # Build tasks
  # ============================================================

  build:all:
    desc: Build all binaries
    #deps: [build:server, build:dl, build:search, build:browse]
    deps: [build:server]

  build:server:
    desc: Build xdcc-server binary
    deps: [frontend:build, frontend:check]
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - "{{.GO_CMD}} build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/xdcc-server{{exeExt}} ./cmd/xdcc-server"
    sources:
      - cmd/xdcc-server/**/*.go
      - internal/**/*.go
      - web/dist/**/*
    generates:
      - "{{.BIN_DIR}}/xdcc-server{{exeExt}}"

  build:dl:
    desc: Build xdcc-dl binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - "{{.GO_CMD}} build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/xdcc-dl{{exeExt}} ./cmd/xdcc-dl"
    sources:
      - cmd/xdcc-dl/**/*.go
      - internal/**/*.go
    generates:
      - "{{.BIN_DIR}}/xdcc-dl{{exeExt}}"

  build:search:
    desc: Build xdcc-search binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - "{{.GO_CMD}} build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/xdcc-search{{exeExt}} ./cmd/xdcc-search"
    sources:
      - cmd/xdcc-search/**/*.go
      - internal/**/*.go
    generates:
      - "{{.BIN_DIR}}/xdcc-search{{exeExt}}"

  build:browse:
    desc: Build xdcc-browse binary
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - "{{.GO_CMD}} build {{.GO_BUILD_FLAGS}} -o {{.BIN_DIR}}/xdcc-browse{{exeExt}} ./cmd/xdcc-browse"
    sources:
      - cmd/xdcc-browse/**/*.go
      - internal/**/*.go
    generates:
      - "{{.BIN_DIR}}/xdcc-browse{{exeExt}}"

  # ============================================================
  # Run tasks
  # ============================================================

  run:
    desc: Run xdcc-server (default)
    deps: [build:server]
    cmds:
      - "{{.BIN_DIR}}/xdcc-server{{exeExt}}"

  run:server:
    desc: Run xdcc-server
    deps: [build:server]
    cmds:
      - "{{.BIN_DIR}}/xdcc-server{{exeExt}} {{.CLI_ARGS}}"

  run:dl:
    desc: 'Run xdcc-dl (usage: task run:dl -- "/msg Bot xdcc send #5")'
    deps: [build:dl]
    cmds:
      - "{{.BIN_DIR}}/xdcc-dl{{exeExt}} {{.CLI_ARGS}}"

  run:search:
    desc: 'Run xdcc-search (usage: task run:search -- "search term")'
    deps: [build:search]
    cmds:
      - "{{.BIN_DIR}}/xdcc-search{{exeExt}} {{.CLI_ARGS}}"

  run:browse:
    desc: 'Run xdcc-browse (usage: task run:browse -- "search term")'
    deps: [build:browse]
    cmds:
      - "{{.BIN_DIR}}/xdcc-browse{{exeExt}} {{.CLI_ARGS}}"

  # ============================================================
  # Frontend tasks
  # ============================================================

  frontend:deps:
    desc: Install frontend dependencies
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm install
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  frontend:build:
    desc: Build frontend (Svelte)
    dir: "{{.WEB_DIR}}"
    deps: [frontend:deps]
    cmds:
      - npm run build
    sources:
      - src/**/*
      - public/**/*
      - index.html
      - vite.config.js
      - svelte.config.js
      - package.json
    generates:
      - dist/**/*

  frontend:dev:
    desc: Run frontend development server
    dir: "{{.WEB_DIR}}"
    deps: [frontend:deps]
    cmds:
      - npm run dev

  frontend:check:
    desc: Run frontend typecheck (svelte-check)
    dir: "{{.WEB_DIR}}"
    deps: [frontend:deps]
    cmds:
      - npx svelte-check --tsconfig ./jsconfig.json --fail-on-warnings

  frontend:clean:
    desc: Clean frontend build artifacts
    cmds:
      - cmd: rm -rf {{.WEB_DIST_DIR}}
        platforms: [linux, darwin]
        ignore_error: true
      - cmd: rmdir /s /q {{.WEB_DIST_DIR}}
        platforms: [windows]
        ignore_error: true
      - cmd: rm -rf {{.WEB_DIR}}/node_modules
        platforms: [linux, darwin]
        ignore_error: true
      - cmd: rmdir /s /q {{.WEB_DIR}}\node_modules
        platforms: [windows]
        ignore_error: true

# ============================================================
  # Test tasks
  # ============================================================

  test:
    desc: Run all tests
    cmds:
      - "{{.GO_CMD}} test -p 2 ./..."

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - "{{.GO_CMD}} test -v -p 2 ./..."

  test:race:
    desc: Run tests with race detector
    cmds:
      - "{{.GO_CMD}} test -race -p 2 ./..."

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - "{{.GO_CMD}} test -cover -p 2 -coverprofile=coverage.out ./..."
      - "{{.GO_CMD}} tool cover -html=coverage.out -o coverage.html"
      - cmd: echo "Coverage report generated at coverage.html"
        silent: true

  test:package:
    desc: 'Run tests for a specific package (usage: task test:package -- ./internal/entities)'
    cmds:
      - "{{.GO_CMD}} test -p 2 {{.CLI_ARGS}}"

  # ============================================================
  # Code quality tasks
  # ============================================================

  fmt:
    desc: Format Go code
    cmds:
      - "{{.GO_CMD}} fmt ./..."

  vet:
    desc: Run go vet
    cmds:
      - "{{.GO_CMD}} vet ./..."

  lint:
    desc: Run linters (requires golangci-lint)
    cmds:
      - cmd: golangci-lint run ./...
        ignore_error: true
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint not found. Install from https://golangci-lint.run/usage/install/"

  check:
    desc: Run all code quality checks (fmt, vet, test, frontend typecheck)
    cmds:
      - task: frontend:check
      - task: fmt
      - task: vet
      - task: test

  # ============================================================
  # Dependency tasks
  # ============================================================

  deps:
    desc: Install all dependencies (Go + frontend)
    cmds:
      - task: deps:go
      - task: frontend:deps

  deps:go:
    desc: Download Go dependencies
    cmds:
      - "{{.GO_CMD}} mod download"
      - "{{.GO_CMD}} mod verify"

  deps:tidy:
    desc: Tidy Go dependencies
    cmds:
      - "{{.GO_CMD}} mod tidy"

  # ============================================================
  # Clean tasks
  # ============================================================

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: clean:binaries
      - task: frontend:clean
      - task: clean:test

  clean:binaries:
    desc: Remove compiled binaries
    cmds:
      - cmd: rm -rf {{.BIN_DIR}}
        platforms: [linux, darwin]
        ignore_error: true
      - cmd: rmdir /s /q {{.BIN_DIR}}
        platforms: [windows]
        ignore_error: true

  clean:test:
    desc: Remove test artifacts
    cmds:
      - cmd: rm -f coverage.out coverage.html
        platforms: [linux, darwin]
        ignore_error: true
      - cmd: del /f coverage.out coverage.html 2>nul
        platforms: [windows]
        ignore_error: true

  # ============================================================
  # Docker tasks
  # ============================================================

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} .

  docker:build:multiarch:
    desc: Build multi-architecture Docker image
    cmds:
      - docker buildx build --platform=linux/amd64,linux/arm64 -t {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}} .

  docker:run:
    desc: Run Docker container
    cmds:
      - docker run -d --name xdcc -p 8080:8080 -v xdcc-data:/data {{.DOCKER_IMAGE}}:{{.DOCKER_TAG}}

  docker:stop:
    desc: Stop and remove Docker container
    cmds:
      - cmd: docker stop xdcc
        ignore_error: true
      - cmd: docker rm xdcc
        ignore_error: true

  # ============================================================
  # Development workflow tasks
  # ============================================================

  dev:
    desc: Start development environment (frontend dev server + backend rebuild)
    cmds:
      - task: frontend:dev

  dev:backend:
    desc: Build and run backend in development mode
    cmds:
      - task: build:server
      - task: run:server

  install:
    desc: Install binaries to system (requires sudo/admin on Linux/Mac)
    deps: [build:all]
    cmds:
      - cmd: |
          cp {{.BIN_DIR}}/xdcc-server /usr/local/bin/
          cp {{.BIN_DIR}}/xdcc-dl /usr/local/bin/
          cp {{.BIN_DIR}}/xdcc-search /usr/local/bin/
          cp {{.BIN_DIR}}/xdcc-browse /usr/local/bin/
        platforms: [linux, darwin]
      - cmd: echo "Windows installation not automated. Manually copy binaries from {{.BIN_DIR}} to a directory in your PATH"
        platforms: [windows]
        silent: true

  # ============================================================
  # CI/CD helper tasks
  # ============================================================

  ci:
    desc: Run CI pipeline (deps, build, test, lint)
    cmds:
      - task: deps
      - task: build:all
      - task: test:race
      - task: vet

  release:
    desc: Build release binaries for all platforms
    cmds:
      - task: clean
      - task: deps
      - task: build:all
      - cmd: echo "Release binaries built in {{.BIN_DIR}}/"
        silent: true

  release:tag:
    desc: 'Tag and push a release (usage: task release:tag -- 0.0.2)'
    cmds:
      - git tag v{{.CLI_ARGS}}
      - git push origin v{{.CLI_ARGS}}
